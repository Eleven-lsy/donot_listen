spring.application.name=dl
server.port=${APP_PORT:8082}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:donot_listen}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Zy147258369000.}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

app.auth.secret=${JWT_SECRET:change-me-in-local-dev}
app.auth.ttl-days=${JWT_TTL_DAYS:30}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.health.db.enabled=true

spring.ai.openai.api-key=${OPENAI_API_KEY:9eb0bb0d22ae47ea9b6e1c1b51e6d3d5.RjFNgXPP22shVMYK}
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:glm-4-flash}
