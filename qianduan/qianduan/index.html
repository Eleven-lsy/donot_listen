<!DOCTYPE html>
<!-- Listening player page markup used after a user signs in. -->

<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不听听力 - 首页</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23C4B5FD' stroke-width='2'><path d='M4 12v-2a8 8 0 0 1 16 0v2'/><rect x='1' y='10' width='5' height='9' rx='2.5' fill='%23C4B5FD'/><rect x='18' y='10' width='5' height='9' rx='2.5' fill='%23C4B5FD'/><circle cx='8.5' cy='14' r='1.5' fill='%23C4B5FD'/><circle cx='15.5' cy='14' r='1.5' fill='%23C4B5FD'/></svg>" type="image/svg+xml"> -->
   <!-- <link rel="icon" href="data:image/svg+xml,..." type="image/svg+xml"> -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23C4B5FD' stroke-width='2'%3E%3Cpath d='M4 12v-2a8 8 0 0 1 16 0v2'/%3E%3Crect x='1' y='10' width='5' height='9' rx='2.5' fill='%23C4B5FD'/%3E%3Crect x='18' y='10' width='5' height='9' rx='2.5' fill='%23C4B5FD'/%3E%3Ccircle cx='8.5' cy='14' r='1.5' fill='%23C4B5FD'/%3E%3Ccircle cx='15.5' cy='14' r='1.5' fill='%23C4B5FD'/%3E%3C/svg%3E" type="image/svg+xml">
    <script src="navigation.js"></script>
    <script src="api-service.js"></script>
    <script src="state-manager.js"></script>
    <script src="ui-components.js"></script>
    <script src="core/App.js"></script>
    <script src="controllers/PlayerController.js"></script>
</head>
<body class="main-body">
    <div class="app-container">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="#" class="brand-logo">
                    <div class="brand-icon-cute">
                        <svg class="cute-face" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 12v-2a8 8 0 0 1 16 0v2"/>
                            <rect x="1" y="10" width="5" height="9" rx="2.5" fill="currentColor" stroke="none"/>
                            <rect x="18" y="10" width="5" height="9" rx="2.5" fill="currentColor" stroke="none"/>
                            <circle cx="8.5" cy="14" r="1.5" fill="currentColor" stroke="none"/>
                            <circle cx="15.5" cy="14" r="1.5" fill="currentColor" stroke="none"/>
                            <path d="M10 16.5c1 1.5 3 1.5 4 0" stroke-width="1.5"/>
                        </svg>
                        <svg class="cute-note" width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 18V5l12-2v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="16" r="3"/>
                        </svg>
                    </div>
                    <div class="brand-text">
                        <span class="brand-title">JUST IMMERSE</span>
                        <span class="brand-subtitle">LISTEN.</span>
                    </div>
                </a>
            </div>
            
            <nav class="sidebar-nav" id="sidebarNav">
            </nav>
        </aside>
        
        <main class="main-content player-page-content">
            <header class="content-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="sidebarToggleBtn" title="切换侧边栏">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <div class="header-title-container">
                        <h1 class="page-title">加载中...</h1>
                    </div>
                    <div class="header-actions">
                        <div class="header-left-actions">
                            <div class="listening-selector-wrapper">
                                <button class="listening-selector-btn" id="listeningSelectorBtn">
                                    <span class="selector-text">选择听力</span>
                                    <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </button>
                                <div class="listening-selector-menu" id="listeningSelectorMenu">
                                    <!-- 听力材料选项将通过JavaScript动态添加 -->
                                </div>
                            </div>
                        </div>
                        <div class="header-right-actions">
                            <button class="listening-favorite-btn" id="listeningFavoriteBtn" title="收藏这篇听力">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                                </svg>
                                <span>收藏</span>
                            </button>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="player-capsule">
                <button class="play-btn" id="playBtn">
                    <svg class="play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                </button>
                
                <div class="progress-section">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                        <div class="progress-handle" id="progressHandle" style="left: 0%"></div>
                    </div>
                    <div class="time-info">
                        <span class="current-time">00:00</span>
                        <span class="separator">/</span>
                        <span class="total-time">00:00</span>
                    </div>
                </div>
                
                <div class="player-controls">
                    <div class="speed-menu-wrapper">
                        <button class="control-btn speed-btn" id="speedBtn">
                            <span class="speed-text">1.0x</span>
                        </button>
                        <div class="speed-menu" id="speedMenu">
                            <button class="speed-option" data-speed="0.6">0.6x</button>
                            <button class="speed-option" data-speed="0.8">0.8x</button>
                            <button class="speed-option active" data-speed="1.0">1.0x</button>
                            <button class="speed-option" data-speed="1.2">1.2x</button>
                            <button class="speed-option" data-speed="1.5">1.5x</button>
                        </div>
                    </div>
                    <button class="control-btn loop-btn" id="loopBtn" title="单句循环">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="17 1 21 5 17 9"/>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                            <polyline points="7 23 3 19 7 15"/>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                        </svg>
                    </button>
                    <button class="control-btn reveal-btn" id="revealBtn" title="显示原文">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="transcript-section">
                <div class="transcript-container blurred" id="transcriptContainer">
                </div>
            </div>
            
            <div class="floating-action-bar">
                <button class="feedback-btn understood" data-feedback="understood">
                    <svg class="feedback-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                    <span>听懂</span>
                </button>
                <button class="feedback-btn familiar" data-feedback="familiar">
                    <svg class="feedback-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                        <line x1="9" y1="9" x2="9.01" y2="9"/>
                        <line x1="15" y1="9" x2="15.01" y2="9"/>
                    </svg>
                    <span>熟悉</span>
                </button>
                <button class="feedback-btn unfamiliar" data-feedback="unfamiliar">
                    <svg class="feedback-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span>陌生</span>
                </button>
            </div>
        </main>
    </div>
    
    <div class="modal-overlay" id="supportModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2>支持作者</h2>
                <button class="modal-close" id="closeSupportModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p class="support-intro">感谢您的支持，您的每一份鼓励都是我持续创作的动力</p>
                <div class="payment-methods">
                    <div class="payment-card active" data-method="wechat">
                        <div class="payment-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M8.5 11a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/>
                                <path d="M12 2C6.48 2 2 6.48 2 12c0 2.17.7 4.18 1.88 5.82L2 22l4.18-1.88C7.82 21.3 9.83 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/>
                            </svg>
                        </div>
                        <span>微信支付</span>
                    </div>
                    <div class="payment-card" data-method="alipay">
                        <div class="payment-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                            </svg>
                        </div>
                        <span>支付宝</span>
                    </div>
                </div>
                <div class="qrcode-section">
                    <div class="qrcode-container active" id="alipayQR">
                        <div class="qrcode-box">
                            <img src="image/e13f20ceaf560d838200904fe5bc1edb.jpg" alt="支付宝收款码">
                        </div>
                        <p class="qrcode-tip">使用支付宝扫描二维码</p>
                    </div>
                    <div class="qrcode-container" id="wechatQR">
                        <div class="qrcode-box">
                            <img src="image/c3586ff511aed63e6626c17716681a40.jpg" alt="微信收款码">
                        </div>
                        <p class="qrcode-tip">使用微信扫描二维码</p>
                    </div>
                </div>
                <p class="support-note">本网站完全免费，赞助仅用于维持服务器日常开销，全凭自愿</p>
                <p class="support-note">感谢你的支持！</p>
                <p class="support-note">如果有任何 Bug 反馈、功能建议，或者单纯想催更，欢迎联系作者邮箱: <span class="contact-info">2014031694@qq.com</span> 或微信: <span class="contact-info">wxid_jnkt7kucmr7f22</span></p>
            </div>
        </div>
    </div>
    
    <audio id="audioPlayer" preload="metadata" style="display: none;">
    </audio>
    <button class="ai-summon-btn" id="aiSummonBtn" title="召唤AI助手">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v4"/>
            <path d="M12 18v4"/>
            <path d="M2 12h4"/>
            <path d="M18 12h4"/>
        </svg>
        <span>召唤AI</span>
    </button>
    
    <div class="modal-overlay" id="aiModal">
        <div class="modal-container ai-modal">
            <div class="modal-header">
                <h2>✨ AI 精讲</h2>
                <div class="ai-header-actions">
                    <button class="ai-play-btn" id="aiPlayBtn" title="播放句子">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                    </button>
                    <button class="modal-close" id="closeAiModal">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="modal-body">
                <div class="ai-original-sentence" id="aiOriginalSentence"></div>
                <div class="ai-response" id="aiResponse"></div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
