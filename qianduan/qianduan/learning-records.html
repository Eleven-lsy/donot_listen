<!DOCTYPE html>
<!-- Learning records page markup for practice summaries. -->

<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习记录 - 不听听力</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23C4B5FD' stroke-width='2'><path d='M4 12v-2a8 8 0 0 1 16 0v2'/><rect x='1' y='10' width='5' height='9' rx='2.5' fill='%23C4B5FD'/><rect x='18' y='10' width='5' height='9' rx='2.5' fill='%23C4B5FD'/><circle cx='8.5' cy='14' r='1.5' fill='%23C4B5FD'/><circle cx='15.5' cy='14' r='1.5' fill='%23C4B5FD'/></svg>" type="image/svg+xml">
    <script src="navigation.js"></script>
    <script src="api-service.js"></script>
    <script src="state-manager.js"></script>
    <script src="ui-components.js"></script>
    <script src="core/App.js"></script>
    <script src="controllers/LearningRecordsController.js"></script>
</head>
<body class="main-body">
    <div class="app-container">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="brand-logo">
                    <div class="brand-icon-cute">
                        <svg class="cute-face" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 12v-2a8 8 0 0 1 16 0v2"/>
                            <rect x="1" y="10" width="5" height="9" rx="2.5" fill="currentColor" stroke="none"/>
                            <rect x="18" y="10" width="5" height="9" rx="2.5" fill="currentColor" stroke="none"/>
                            <circle cx="8.5" cy="14" r="1.5" fill="currentColor" stroke="none"/>
                            <circle cx="15.5" cy="14" r="1.5" fill="currentColor" stroke="none"/>
                            <path d="M10 16.5c1 1.5 3 1.5 4 0" stroke-width="1.5"/>
                        </svg>
                        <svg class="cute-note" width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 18V5l12-2v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="16" r="3"/>
                        </svg>
                    </div>
                    <div class="brand-text">
                        <span class="brand-title">JUST IMMERSE</span>
                        <span class="brand-subtitle">LISTEN.</span>
                    </div>
                </a>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
            </nav>
        </aside>
        <main class="main-content">
            <header class="content-header">
                <button class="sidebar-toggle-btn" id="sidebarToggleBtn" title="切换侧边栏">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1 class="page-title">学习记录</h1>
            </header>
            <div class="stats-overview">
                <div class="stat-card total">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 19V6l12-3v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="15" r="3"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">总音频数</span>
                        <span class="stat-value" id="totalAudio">0</span>
                    </div>
                </div>
                <div class="stat-card unfamiliar">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">未学习/陌生</span>
                        <span class="stat-value" id="unfamiliarCount">0</span>
                    </div>
                </div>
                <div class="stat-card familiar">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                            <line x1="9" y1="9" x2="9.01" y2="9"/>
                            <line x1="15" y1="9" x2="15.01" y2="9"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">熟悉</span>
                        <span class="stat-value" id="familiarCount">0</span>
                    </div>
                </div>
                <div class="stat-card understood">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">听懂</span>
                        <span class="stat-value" id="understoodCount">0</span>
                    </div>
                </div>
            </div>
            <div class="learning-detail-section">
                <div class="detail-tabs">
                    <button class="tab-btn active" data-tab="unfamiliar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        未学习/陌生
                        <span class="tab-count" id="unfamiliarTabCount">0</span>
                    </button>
                    <button class="tab-btn" data-tab="familiar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                            <line x1="9" y1="9" x2="9.01" y2="9"/>
                            <line x1="15" y1="9" x2="15.01" y2="9"/>
                        </svg>
                        熟悉
                        <span class="tab-count" id="familiarTabCount">0</span>
                    </button>
                    <button class="tab-btn" data-tab="understood">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                        听懂
                        <span class="tab-count" id="understoodTabCount">0</span>
                    </button>
                </div>
                <div class="detail-content">
                    <div class="tab-panel active" id="panel-unfamiliar">
                        <div class="audio-list" id="unfamiliarList">
                        </div>
                    </div>
                    <div class="tab-panel" id="panel-familiar">
                        <div class="audio-list" id="familiarList">
                        </div>
                    </div>
                    <div class="tab-panel" id="panel-understood">
                        <div class="audio-list" id="understoodList">
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="modal-overlay" id="supportModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2>支持作者</h2>
                <button class="modal-close" id="closeSupportModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p class="support-intro">感谢您的支持，您的每一份鼓励都是我持续创作的动力</p>
                <div class="payment-methods">
                    <div class="payment-card active" data-method="wechat">
                        <div class="payment-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M8.5 11a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/>
                                <path d="M12 2C6.48 2 2 6.48 2 12c0 2.17.7 4.18 1.88 5.82L2 22l4.18-1.88C7.82 21.3 9.83 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/>
                            </svg>
                        </div>
                        <span>微信支付</span>
                    </div>
                    <div class="payment-card" data-method="alipay">
                        <div class="payment-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                                <path d="M2 17l10 5 10-5"/>
                                <path d="M2 12l10 5 10-5"/>
                            </svg>
                        </div>
                        <span>支付宝</span>
                    </div>
                </div>
                <div class="qrcode-section">
                    <div class="qrcode-container active" id="alipayQR">
                        <div class="qrcode-box">
                            <img src="image/e13f20ceaf560d838200904fe5bc1edb.jpg" alt="支付宝收款码">
                        </div>
                        <p class="qrcode-tip">使用支付宝扫描二维码</p>
                    </div>
                    <div class="qrcode-container" id="wechatQR">
                        <div class="qrcode-box">
                            <img src="image/c3586ff511aed63e6626c17716681a40.jpg" alt="微信收款码">
                        </div>
                        <p class="qrcode-tip">使用微信扫描二维码</p>
                    </div>
                </div>
                <p class="support-note">本网站完全免费，赞助仅用于维持服务器日常开销，全凭自愿</p>
                <p class="support-note">感谢你的支持！</p>
                <p class="support-note">如果有任何 Bug 反馈、功能建议，或者单纯想催更，欢迎联系作者邮箱: <span class="contact-info">2014031694@qq.com</span> 或微信: <span class="contact-info">wxid_jnkt7kucmr7f22</span></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
