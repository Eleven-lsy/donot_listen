<!DOCTYPE html>
<!-- Authentication page markup for login and registration. -->

<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 不听听力</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23C4B5FD' stroke-width='2'><path d='M4 12v-2a8 8 0 0 1 16 0v2'/><rect x='1' y='10' width='5' height='9' rx='2.5' fill='%23C4B5FD'/><rect x='18' y='10' width='5' height='9' rx='2.5' fill='%23C4B5FD'/><circle cx='8.5' cy='14' r='1.5' fill='%23C4B5FD'/><circle cx='15.5' cy='14' r='1.5' fill='%23C4B5FD'/></svg>" type="image/svg+xml">
    <script src="navigation.js"></script>
    <script src="api-service.js"></script>
    <script src="state-manager.js"></script>
    <script src="ui-components.js"></script>
    <script src="controllers/LoginController.js"></script>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <div class="brand-icon-cute logo-icon">
                    <svg class="cute-face" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12v-2a8 8 0 0 1 16 0v2"></path>
                        <rect x="1" y="10" width="5" height="9" rx="2.5" fill="currentColor" stroke="none"></rect>
                        <rect x="18" y="10" width="5" height="9" rx="2.5" fill="currentColor" stroke="none"></rect>
                        <circle cx="8.5" cy="14" r="1.5" fill="currentColor" stroke="none"></circle>
                        <circle cx="15.5" cy="14" r="1.5" fill="currentColor" stroke="none"></circle>
                        <path d="M10 16.5c1 1.5 3 1.5 4 0" stroke-width="1.5"></path>
                    </svg>
                    <svg class="cute-note" width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M9 18V5l12-2v13"></path>
                        <circle cx="6" cy="18" r="3"></circle>
                        <circle cx="18" cy="16" r="3"></circle>
                    </svg>
                </div>
                <span class="logo-text" id="brandText">JUST IMMERSE</span>
            </div>
            <h1 class="login-title" id="loginTitle">Welcome Back</h1>
            <p class="login-subtitle" id="loginSubtitle">Sign in to continue your listening practice.</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="username" class="form-label" id="usernameLabel">Username or Email</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter username or email" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label" id="passwordLabel">Password</label>
                <div class="password-input">
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" required>
                    <button type="button" class="toggle-password" id="togglePassword">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember" class="form-checkbox">
                    <span id="rememberText">Remember me</span>
                </label>
                <a href="#" class="forgot-password" id="forgotText">Forgot password?</a>
            </div>
            <button type="submit" class="login-btn" id="loginButton">Login</button>
            <div class="register-link">
                <span id="registerPrompt">No account yet?</span>
                <a href="#" id="showRegister">Create one</a>
            </div>
        </form>

        <form class="register-form" id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="regUsername" class="form-label" id="regUsernameLabel">Username</label>
                <input type="text" id="regUsername" name="regUsername" class="form-input" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="regEmail" class="form-label" id="regEmailLabel">Email</label>
                <input type="email" id="regEmail" name="regEmail" class="form-input" placeholder="Enter email" required>
            </div>
            <div class="form-group">
                <label for="regPassword" class="form-label" id="regPasswordLabel">Password</label>
                <div class="password-input">
                    <input type="password" id="regPassword" name="regPassword" class="form-input" placeholder="Enter password" required>
                    <button type="button" class="toggle-password" id="toggleRegPassword">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="login-btn" id="registerButton">Register</button>
            <div class="register-link">
                <span id="loginPrompt">Already have an account?</span>
                <a href="#" id="showLogin">Back to login</a>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const textMap = {
                loginTitle: '\u6b22\u8fce\u56de\u6765',
                loginSubtitle: '\u767b\u5f55\u540e\u5f00\u59cb\u4f60\u7684\u542c\u529b\u7ec3\u4e60',
                usernameLabel: '\u7528\u6237\u540d\u6216\u90ae\u7bb1',
                passwordLabel: '\u5bc6\u7801',
                rememberText: '\u8bb0\u4f4f\u6211',
                forgotText: '\u5fd8\u8bb0\u5bc6\u7801\uff1f',
                loginButton: '\u767b\u5f55',
                registerPrompt: '\u8fd8\u6ca1\u6709\u8d26\u53f7\uff1f',
                showRegister: '\u7acb\u5373\u6ce8\u518c',
                regUsernameLabel: '\u7528\u6237\u540d',
                regEmailLabel: '\u90ae\u7bb1',
                regPasswordLabel: '\u5bc6\u7801',
                registerButton: '\u6ce8\u518c',
                loginPrompt: '\u5df2\u6709\u8d26\u53f7\uff1f',
                showLogin: '\u7acb\u5373\u767b\u5f55'
            };

            Object.entries(textMap).forEach(([id, text]) => {
                const element = document.getElementById(id);
                if (element) {
                    element.textContent = text;
                }
            });

            const placeholderMap = {
                username: '\u8bf7\u8f93\u5165\u7528\u6237\u540d\u6216\u90ae\u7bb1',
                password: '\u8bf7\u8f93\u5165\u5bc6\u7801',
                regUsername: '\u8bf7\u8f93\u5165\u7528\u6237\u540d',
                regEmail: '\u8bf7\u8f93\u5165\u90ae\u7bb1',
                regPassword: '\u8bf7\u8f93\u5165\u5bc6\u7801'
            };

            Object.entries(placeholderMap).forEach(([id, text]) => {
                const element = document.getElementById(id);
                if (element) {
                    element.placeholder = text;
                }
            });
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
